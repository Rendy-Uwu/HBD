<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>HBD</title>
</head>
<body>
    <div class="card">
    <div class="back"></div>
    <div class="front">
        <div class="hover-text">Pencet Disini😁</div>
        <div class="cover-shape-large">
            <div class="shape-diamond"></div>
            <div class="shape-block"></div>
            </div>
            <div class="cover-shape-small">
            <div class="shape-diamond"></div>
                <div class="shape-block">
                    <div class="cake">
                        <div class="layer layer-bottom"></div>
                        <div class="layer layer-middle"></div>
                        <div class="layer layer-top"></div>
                        <div class="icing"></div>
                        <div class="drip drip1"></div>
                        <div class="drip drip2"></div>
                        <div class="drip drip3"></div>
                        <div class="candle">
                            <div class="flame"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="text-container">
        <p id="head">Selamat Ulang Tahun!</p>
        <div>Untuk Yg Sedang Ulang Tahun <br>SEMANGAT!!!!!</div>
    </div>

    <p> Semoga Sukses</p>
    </div>

    <script>
  const card = document.querySelector('.card');

  card.addEventListener('click', () => {
    card.classList.toggle('flipped');
  });

  // Optional: double click untuk reset ke depan
  card.addEventListener('dblclick', () => {
    card.classList.remove('flipped');
  });
</script>
    <script src="script.js"></script>
</body>
</html>
